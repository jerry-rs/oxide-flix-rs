<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxide Flix</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --accent-color: #f08a5d;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --hover-bg: #1c2333;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0;
        }

        .header h1 {
            font-size: 1.6rem;
            color: var(--accent-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            font-size: 1.4rem;
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            background: var(--panel-bg);
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            min-height: 46px;
        }

        .breadcrumb a {
            color: var(--accent-color);
            text-decoration: none;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.15s;
        }

        .breadcrumb a:hover {
            background: var(--hover-bg);
        }

        .breadcrumb .sep {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .breadcrumb .current {
            color: var(--text-muted);
            padding: 2px 6px;
        }

        /* File grid */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            min-height: 120px;
        }

        .file-grid .empty-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
        }

        .file-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 8px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.15s, border-color 0.15s;
            text-align: center;
            min-height: 110px;
        }

        .file-item {
            position: relative;
        }

        .file-item:hover {
            background: var(--hover-bg);
            border-color: var(--border-color);
        }

        .file-item .delete-btn {
            display: none;
            position: absolute;
            top: 6px;
            right: 6px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 80, 80, 0.85);
            color: #fff;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            z-index: 2;
            padding: 0;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .file-item:hover .delete-btn {
            display: flex;
        }

        .file-item .delete-btn:hover {
            background: rgba(200, 40, 40, 0.95);
        }

        .file-item .icon {
            font-size: 2.2rem;
            line-height: 1;
        }

        .file-item .name {
            font-size: 0.82rem;
            word-break: break-all;
            line-height: 1.3;
            max-width: 100%;
        }

        .file-item .sub {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        /* 上下分栏布局 */
        .main-split {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .browser-panel {
            flex: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Player */
        .player-wrapper {
            background: black;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            aspect-ratio: 16 / 9;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Info panel */
        .info-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
        }

        .info-panel h3 {
            margin: 0 0 10px 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            font-size: 1rem;
            color: white;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .meta-label {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .meta-value {
            font-size: 0.9rem;
            font-weight: 500;
            word-break: break-all;
        }

        .no-video-msg {
            color: var(--text-muted);
            text-align: center;
            padding: 30px 10px;
            font-size: 0.9rem;
        }

        .error-msg {
            color: #ff6b6b;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 6px;
            display: none;
            border: 1px solid rgba(255, 107, 107, 0.2);
            font-size: 0.88rem;
        }

        /* 响应式：窄屏缩小文件格 */
        @media (max-width: 820px) {
            .file-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><span>🦀</span> Oxide Flix</h1>
    </div>

    <!-- 面包屑导航 -->
    <div class="breadcrumb" id="breadcrumb"></div>

    <!-- 错误提示 -->
    <div id="errorBox" class="error-msg"></div>

    <!-- 主区域：上文件浏览器 + 下播放器 -->
    <div class="main-split">
        <!-- 文件浏览器 -->
        <div class="browser-panel">
            <div class="file-grid" id="fileGrid"></div>
        </div>

        <!-- 播放器面板 -->
        <div class="player-panel">
            <div class="player-wrapper">
                <video id="mainPlayer" controls preload="metadata">
                    您的浏览器不支持 HTML5 视频播放。
                </video>
            </div>
            <div class="info-panel" id="infoPanel">
                <h3 id="nowPlaying">🎬 未选择视频</h3>
                <div id="metaContent">
                    <div class="no-video-msg">在上面浏览文件，点击视频开始播放</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const BASE_URL = "";
    let currentPath = ""; // 当前浏览的目录路径（相对于 DATA_DIR）

    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function showError(msg) {
        const box = document.getElementById('errorBox');
        box.textContent = msg;
        box.style.display = "block";
    }

    function hideError() {
        document.getElementById('errorBox').style.display = "none";
    }

    // ---------- 面包屑 ----------
    function renderBreadcrumb(path) {
        const container = document.getElementById('breadcrumb');
        const parts = path ? path.split('/') : [];
        let html = `<a data-path="">📁 根目录</a>`;
        let accumulated = "";
        for (const part of parts) {
            if (!part) continue;
            accumulated = accumulated ? accumulated + "/" + part : part;
            html += `<span class="sep">/</span>`;
            html += `<a data-path="${accumulated}">${escapeHtml(part)}</a>`;
        }
        // 如果当前路径为空不显示 current 标记，因为已经有根目录链接了
        container.innerHTML = html;

        // 绑定面包屑点击事件
        container.querySelectorAll('a').forEach(a => {
            a.addEventListener('click', (e) => {
                e.stopPropagation();
                const targetPath = a.dataset.path;
                navigateTo(targetPath);
            });
        });
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    // ---------- 加载目录列表 ----------
    async function navigateTo(path) {
        hideError();
        currentPath = path || "";
        renderBreadcrumb(currentPath);

        const grid = document.getElementById('fileGrid');
        grid.innerHTML = '<div class="empty-msg">⏳ 加载中...</div>';

        try {
            const encPath = currentPath.split('/').map(seg => encodeURIComponent(seg)).join('/');
            const url = currentPath ? `${BASE_URL}/api/video/list/${encPath}` : `${BASE_URL}/api/video/list`;
            const resp = await fetch(url);

            if (!resp.ok) {
                if (resp.status === 404) {
                    grid.innerHTML = '<div class="empty-msg">📂 目录不存在</div>';
                } else {
                    grid.innerHTML = '<div class="empty-msg">❌ 加载失败</div>';
                }
                return;
            }

            const data = await resp.json();
            renderFileGrid(data.entries);
        } catch (err) {
            showError("网络错误：" + err.message);
            document.getElementById('fileGrid').innerHTML = '<div class="empty-msg">❌ 无法连接到服务器</div>';
        }
    }

    function renderFileGrid(entries) {
        const grid = document.getElementById('fileGrid');

        if (!entries || entries.length === 0) {
            grid.innerHTML = '<div class="empty-msg">📂 此文件夹为空</div>';
            return;
        }

        let html = "";
        for (const entry of entries) {
            if (entry.is_dir) {
                html += `
                    <div class="file-item" data-type="dir" data-name="${escapeHtml(entry.name)}">
                        <button class="delete-btn" title="删除文件夹">✕</button>
                        <div class="icon">📁</div>
                        <div class="name">${escapeHtml(entry.name)}</div>
                        <div class="sub">文件夹</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="file-item" data-type="video" data-name="${escapeHtml(entry.name)}">
                        <button class="delete-btn" title="删除文件">✕</button>
                        <div class="icon">🎬</div>
                        <div class="name">${escapeHtml(entry.name)}</div>
                        <div class="sub">${formatBytes(entry.size_bytes)}</div>
                    </div>
                `;
            }
        }

        grid.innerHTML = html;

        // 绑定点击事件
        grid.querySelectorAll('.file-item').forEach(item => {
            // 删除按钮（阻止冒泡到 .file-item 的点击）
            const delBtn = item.querySelector('.delete-btn');
            if (delBtn) {
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const type = item.dataset.type;
                    const name = item.dataset.name;
                    const filePath = currentPath ? currentPath + '/' + name : name;
                    deleteItem(filePath, type === 'dir');
                });
            }

            // 点击项目本身：导航或播放
            item.addEventListener('click', () => {
                const type = item.dataset.type;
                const name = item.dataset.name;
                if (type === 'dir') {
                    const newPath = currentPath ? currentPath + '/' + name : name;
                    navigateTo(newPath);
                } else {
                    const filePath = currentPath ? currentPath + '/' + name : name;
                    loadVideo(filePath);
                }
            });
        });
    }

    // ---------- 加载视频 ----------
    async function loadVideo(filePath) {
        hideError();
        const player = document.getElementById('mainPlayer');
        const infoPanel = document.getElementById('infoPanel');
        const metaContent = document.getElementById('metaContent');
        const nowPlaying = document.getElementById('nowPlaying');

        if (!filePath || !filePath.trim()) {
            showError("无效的视频文件路径");
            return;
        }

        // 高亮当前选中的文件
        document.querySelectorAll('.file-item').forEach(el => {
            el.style.borderColor = 'transparent';
            el.style.background = '';
        });

        try {
            // 对路径中的每个部分进行 URL 编码，确保特殊字符正确传递
            const encodedPath = filePath.split('/').map(seg => encodeURIComponent(seg)).join('/');
            const infoUrl = `${BASE_URL}/api/video/info/${encodedPath}`;
            const response = await fetch(infoUrl);

            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error("未找到视频文件");
                } else {
                    throw new Error(`服务器响应异常: ${response.status}`);
                }
            }

            const data = await response.json();

            nowPlaying.textContent = `🎬 ${data.filename}`;
            metaContent.innerHTML = `
                <div class="meta-grid">
                    <div class="meta-item">
                        <span class="meta-label">文件名称</span>
                        <span class="meta-value">${escapeHtml(data.filename)}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">文件大小</span>
                        <span class="meta-value">${formatBytes(data.size_bytes)}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">编码格式</span>
                        <span class="meta-value">${escapeHtml(data.mime_type)}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">播放模式</span>
                        <span class="meta-value">${escapeHtml(data.suggested_player_mode)}</span>
                    </div>
                </div>
            `;

            player.src = `${BASE_URL}/api/video/stream/${encodedPath}`;
            player.load();

        } catch (error) {
            showError(error.message);
            nowPlaying.textContent = "🎬 播放失败";
            metaContent.innerHTML = `<div class="no-video-msg">${escapeHtml(error.message)}</div>`;
            player.src = "";
        }
    }

    // ---------- 删除文件/文件夹 ----------
    async function deleteItem(filePath, isDir) {
        const label = isDir ? '文件夹' : '文件';
        if (!confirm(`确定要删除${label} "${filePath}" 吗？${isDir ? '目录内的所有内容将被一并删除。' : ''}`)) {
            return;
        }

        try {
            const encPath = filePath.split('/').map(seg => encodeURIComponent(seg)).join('/');
            const resp = await fetch(`${BASE_URL}/api/video/delete/${encPath}`, {
                method: 'DELETE',
            });

            if (!resp.ok) {
                const text = await resp.text().catch(() => '未知错误');
                throw new Error(text || `删除失败 (${resp.status})`);
            }

            // 刷新当前目录列表
            navigateTo(currentPath);
        } catch (err) {
            showError(`删除失败: ${err.message}`);
        }
    }

    // ---------- 初始化 ----------
    document.addEventListener('DOMContentLoaded', () => {
        navigateTo("");
    });
</script>
</body>
</html>
